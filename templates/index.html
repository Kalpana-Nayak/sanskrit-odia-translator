<!DOCTYPE html>
<html>
<head>
    <title>Sanskrit to Odia Translator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #ffffff;
        }
        h1 {
            color: #333;
        }
        textarea {
            width: 60%;
            height: 100px;
            margin: 10px;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        .output {
            margin-top: 20px;
            font-size: 18px;
            color: blue;
        }
    </style>
</head>
<body>

    <h1>Sanskrit → Odia Translator</h1>

    <form method="POST">
        <textarea name="text" placeholder="Enter Sanskrit sentence..."></textarea><br>
        <button type="submit">Translate</button>
    </form>

    <div class="output">
        <strong>Output:</strong> {{ output }}
    </div>

</body>
</html>
